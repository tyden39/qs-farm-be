services:
  db:
    image: postgres:14
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5.4.0
    restart: always
    env_file:
      - .env
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    environment:
      - EMQX_NODE__COOKIE=${EMQX_NODE__COOKIE}
      - EMQX_DASHBOARD__DEFAULT_USERNAME=${EMQX_DASHBOARD__DEFAULT_USERNAME}
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=${EMQX_DASHBOARD__DEFAULT_PASSWORD}
      - EMQX_LISTENERS__TCP__DEFAULT__ENABLED=${EMQX_LISTENERS__TCP__DEFAULT__ENABLED}
      - EMQX_LISTENERS__TCP__DEFAULT__BIND=${EMQX_LISTENERS__TCP__DEFAULT__BIND}
      - EMQX_LISTENERS__WS__DEFAULT__ENABLED=${EMQX_LISTENERS__WS__DEFAULT__ENABLED}
      - EMQX_LISTENERS__WS__DEFAULT__BIND=${EMQX_LISTENERS__WS__DEFAULT__BIND}
      - EMQX_LISTENERS__WSS__DEFAULT__ENABLED=${EMQX_LISTENERS__WSS__DEFAULT__ENABLED}
      - EMQX_AUTH_USER__PASSWORD_HASH_TYPE=${EMQX_AUTH_USER__PASSWORD_HASH_TYPE}
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  nest-backend:
    image: ghcr.io/tyden39/qs-farm-be:latest
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
      MQTT_BROKER_URL: mqtt://emqx:1883
      EMQX_DASHBOARD_URL: http://emqx:18083
      NODE_ENV: production
    volumes:
      - ./qs-farm-test-firebase-adminsdk-fbsvc-12c9996b25.json:/app/service-account.json:ro
      - app-files:/app/files
    ports:
      - "3040:3000"
    depends_on:
      db:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pg-data:
  emqx-data:
  emqx-log:
  app-files:
